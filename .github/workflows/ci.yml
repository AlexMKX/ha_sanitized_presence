name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: pip install black pylint vulture pytest pytest-asyncio homeassistant
      - name: black --check
        run: black --check custom_components/
      - name: pylint
        run: pylint custom_components/sanitized_presence
      - name: vulture (dead code)
        # other_flow: required by HA ConfigFlow.is_matching override signature
        run: vulture custom_components/sanitized_presence --ignore-names other_flow

  tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-cov homeassistant
      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            --ignore=custom_components/sanitized_presence/tests/test_integration_e2e.py \
            --cov --cov-report=term-missing -v
